# Polls FDA pages every 5 minutes (UTC). On content change, sends SMTP email and commits updated watch/state.json.
#
# Required repository secrets:
#   SMTP_HOST, SMTP_PORT (optional, default 587), SMTP_USER, SMTP_PASSWORD, EMAIL_FROM, EMAIL_TO
#
# Scheduled workflows only run on the default branch. For private repos, Actions minutes apply (~288 runs/day).

name: FDA page watch

on:
  schedule:
    # Every 5 minutes (UTC). GitHub may delay a few minutes during high load.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: fda-page-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check pages and notify
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/watch_fda_pages.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add watch/state.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(watch): update FDA page fingerprints"
            git push
          fi
